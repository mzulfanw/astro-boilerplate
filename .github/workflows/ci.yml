name: CI

on:
  pull_request:
  push:
    branches: [nodejs]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

name: Deploy

on:
  push:
    branches: [nodejs]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Buat .env dari GitHub Secret
        run: |
          echo "::notice::Copy ENV_PRODUCTION ke .env"
          # echo "${{ secrets.ENV_PRODUCTION }}" > .env

      - name: 🚀 Deploy ke Droplet
        run: |
          echo "::notice::SSH ke droplet & deploy astro"
          echo "  scp .env deploy@<ip>:/opt/astro-boilerplate/.env"
          echo "  ssh deploy@<ip> \"cd /opt/astro-boilerplate && git pull origin nodejs && docker compose up -d --build && docker image prune -f\""

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - astro-app
    restart: unless-stopped

  astro-app:
    image: ghcr.io/mzulfanw/astro-boilerplate:latest
    container_name: astro-app
    env_file: .env
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
